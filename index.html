<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <link href="styles.css" rel="stylesheet">
        <script>
            function greet()
            {
                let name = document.querySelector("#name").value;
                if (name === "")
                {
                    name = "world";
                }
                document.querySelector("#result").innerHTML = "Hello, " + name + "!";
            }
        </script>
        <title>Homepage</title>
    </head>
    <body>
        <div class="content">
            <h1>Welcome To My Web Page</h1><br>
            <div>
                <h2 id="result">Hello, world!</h2>
            </div>
            <form onsubmit="greet(); return false;">
                <input id="name" type="text" autofocus autocomplete="off" placeholder="What is your name?">
                <input type="submit">
            </form><br>
            <h3>My name is Dalvinderjit Singh and I am an aspiring web developer. This web page is made to host my projects and serve as my portfolio.</a>.
            </h3>
        </div>
    </body>
</html>
